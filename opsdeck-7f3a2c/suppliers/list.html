<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supplier CRM — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Supplier CRM</h4>
    <a href="new_edit.html" class="btn btn-success btn-sm">+ New Supplier</a>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <div class="fs-3 fw-bold text-primary" id="statTotal">—</div>
          <div class="small text-muted">Active Suppliers</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <div class="fs-3 fw-bold text-success" id="statPreferred">—</div>
          <div class="small text-muted">Preferred Vendors</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <div class="fs-3 fw-bold" id="statExpiring">—</div>
          <div class="small text-muted">Contracts Expiring &lt;90d</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card text-center border-0 shadow-sm">
        <div class="card-body py-3">
          <div class="fs-3 fw-bold" id="statUnvetted">—</div>
          <div class="small text-muted">Not Yet Vetted</div>
        </div>
      </div>
    </div>
  </div>

  <form class="d-flex gap-2 mb-3" onsubmit="return false">
    <input type="text" id="searchBox" placeholder="Search supplier name or tag…"
           class="form-control form-control-sm" style="max-width:320px">
    <button class="btn btn-sm btn-outline-secondary" id="btnClearSearch">Clear</button>
    <div class="ms-auto">
      <button type="button" class="btn btn-sm btn-outline-secondary" id="btnToggleInactive">Show Inactive</button>
    </div>
  </form>

  <div id="tableWrap"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;
  let showInactive = false;

  fetch('../data/suppliers/suppliers.json').then(r => r.json()).then(data => {
    DATA = data;
    document.getElementById('statTotal').textContent = data.stats.total;
    document.getElementById('statPreferred').textContent = data.stats.preferred;
    const expEl = document.getElementById('statExpiring');
    expEl.textContent = data.stats.expiring;
    expEl.className = 'fs-3 fw-bold ' + (data.stats.expiring > 0 ? 'text-danger' : 'text-secondary');
    const unvEl = document.getElementById('statUnvetted');
    unvEl.textContent = data.stats.unvetted;
    unvEl.className = 'fs-3 fw-bold ' + (data.stats.unvetted > 0 ? 'text-warning' : 'text-secondary');
    render();
  });

  function fmtDate(iso) {
    if (!iso) return null;
    const [y, m, d] = iso.split('-');
    return `${m}/${d}/${y}`;
  }

  function daysLeft(iso, today) {
    if (!iso) return null;
    const exp = new Date(iso + 'T00:00:00');
    const t = new Date(today + 'T00:00:00');
    return Math.round((exp - t) / 86400000);
  }

  function render() {
    const q = (document.getElementById('searchBox').value || '').toLowerCase().trim();
    let rows = DATA.suppliers.filter(s => s.is_active === !showInactive);
    if (q) {
      rows = rows.filter(s =>
        s.name.toLowerCase().includes(q) ||
        (s.tags || '').toLowerCase().includes(q)
      );
    }
    // preferred_vendor DESC, name ASC (already sorted that way in source; re-sort defensively)
    rows = rows.slice().sort((a, b) => {
      if (a.preferred_vendor !== b.preferred_vendor) return a.preferred_vendor ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    const wrap = document.getElementById('tableWrap');
    if (!rows.length) {
      wrap.innerHTML = `
        <div class="text-center text-muted py-5">
          <p class="mb-2">No ${showInactive ? 'inactive' : ''} suppliers found${q ? ' matching your search' : ''}.</p>
          ${!showInactive ? '<a href="new_edit.html" class="btn btn-success btn-sm">+ Add First Supplier</a>' : ''}
        </div>`;
      return;
    }

    const today = DATA.today;
    wrap.innerHTML = `
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover table-sm mb-0 align-middle">
            <thead>
              <tr>
                <th>Supplier</th>
                <th>Primary Contact</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Date Vetted</th>
                <th>Preferred</th>
                <th>Contract Expires</th>
                <th>Last Comm</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(s => rowHtml(s, today)).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  function rowHtml(s, today) {
    const dl = daysLeft(s.contract_expires_on, today);
    let expiresHtml = '—';
    if (s.contract_expires_on) {
      const d = fmtDate(s.contract_expires_on);
      if (dl < 0) expiresHtml = `<span class="text-danger fw-bold">EXPIRED</span>`;
      else if (dl <= 30) expiresHtml = `<span class="text-danger fw-bold">${d}</span>`;
      else if (dl <= 90) expiresHtml = `<span class="text-warning fw-bold">${d}</span>`;
      else expiresHtml = d;
    }
    const tags = (s.tags || '').split(',').map(t => t.trim()).filter(Boolean)
      .map(t => `<span class="badge bg-secondary ms-1" style="font-size:.7rem">${t}</span>`).join('');
    return `
      <tr>
        <td>
          <a href="detail.html?id=${s.id}" class="fw-semibold text-decoration-none">${s.name}</a>
          ${tags}
        </td>
        <td>${s.primary_contact_name || '—'}</td>
        <td class="text-nowrap">${s.primary_contact_phone || '—'}</td>
        <td>${s.primary_contact_email ? `<a href="mailto:${s.primary_contact_email}" class="text-decoration-none" style="font-size:.85rem">${s.primary_contact_email}</a>` : '—'}</td>
        <td class="text-nowrap">${s.date_vetted ? fmtDate(s.date_vetted) : '<span class="text-warning fw-semibold">—</span>'}</td>
        <td class="text-center">${s.preferred_vendor ? '<span class="badge bg-success">★ Preferred</span>' : ''}</td>
        <td class="text-nowrap">${expiresHtml}</td>
        <td class="text-nowrap text-muted" style="font-size:.85rem">${s.last_comm_date ? fmtDate(s.last_comm_date) : '—'}</td>
        <td><a href="detail.html?id=${s.id}" class="btn btn-xs btn-outline-primary btn-sm py-0 px-2">View</a></td>
      </tr>`;
  }

  document.getElementById('searchBox').addEventListener('input', render);
  document.getElementById('btnClearSearch').addEventListener('click', () => {
    document.getElementById('searchBox').value = '';
    render();
  });
  document.getElementById('btnToggleInactive').addEventListener('click', function () {
    showInactive = !showInactive;
    this.textContent = showInactive ? 'Show Active' : 'Show Inactive';
    render();
  });
</script>
</body>
</html>
