<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Supplier — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="list.html" class="btn btn-sm btn-outline-secondary">← Back</a>
    <h4 class="mb-0" id="pageTitle">New Supplier</h4>
  </div>

  <div class="alert alert-secondary py-2" style="font-size:.85rem">
    This form mirrors the live Supplier CRM's create/edit screen. Saving is disabled in this static
    portfolio demo — <a href="detail.html" id="backToDetailLink" class="d-none">go back to the supplier</a>.
  </div>

  <form onsubmit="return false">
    <div class="row g-4">

      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white py-2">Company Info</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label fw-semibold">Supplier Name <span class="text-danger">*</span></label>
              <input type="text" id="fName" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Website</label>
              <input type="url" id="fWebsite" class="form-control" placeholder="https://">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Address Line 1</label>
              <input type="text" id="fAddr1" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Address Line 2</label>
              <input type="text" id="fAddr2" class="form-control">
            </div>
            <div class="row g-2">
              <div class="col-6">
                <label class="form-label fw-semibold">City</label>
                <input type="text" id="fCity" class="form-control">
              </div>
              <div class="col-2">
                <label class="form-label fw-semibold">State</label>
                <input type="text" id="fState" class="form-control text-uppercase" maxlength="2">
              </div>
              <div class="col-4">
                <label class="form-label fw-semibold">Zip</label>
                <input type="text" id="fZip" class="form-control">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card shadow-sm mb-3">
          <div class="card-header bg-dark text-white py-2">Procurement Details</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label fw-semibold">Date Vetted</label>
              <input type="date" id="fVetted" class="form-control">
            </div>
            <div class="mb-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="fPreferred">
                <label class="form-check-label fw-semibold" for="fPreferred">Preferred Vendor</label>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Contract Expires</label>
              <input type="date" id="fExpires" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Payment Terms</label>
              <input type="text" id="fTerms" class="form-control" placeholder="e.g. Net 30, COD">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Lead Time (days)</label>
              <input type="number" id="fLeadTime" class="form-control" min="0" max="365">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Tags <span class="text-muted fw-normal">(comma-separated)</span></label>
              <input type="text" id="fTags" class="form-control" placeholder="e.g. sutures, gloves, priority">
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-dark text-white py-2">Notes</div>
          <div class="card-body">
            <textarea id="fNotes" class="form-control" rows="4" placeholder="Internal notes about this supplier…"></textarea>
          </div>
        </div>
      </div>

    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="button" class="btn btn-success" id="btnSave" data-demo-inert="Save Supplier">Create Supplier</button>
      <a href="list.html" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const editId = params.get('id');

  if (editId) {
    fetch('../data/suppliers/suppliers.json').then(r => r.json()).then(data => {
      const s = data.suppliers.find(x => String(x.id) === String(editId));
      if (!s) return;
      document.getElementById('pageTitle').textContent = 'Edit: ' + s.name;
      document.getElementById('btnSave').textContent = 'Save Changes';
      document.getElementById('btnSave').setAttribute('data-demo-inert', 'Save Supplier Changes');
      document.getElementById('backToDetailLink').href = 'detail.html?id=' + s.id;
      document.getElementById('backToDetailLink').classList.remove('d-none');

      document.getElementById('fName').value = s.name || '';
      document.getElementById('fWebsite').value = s.website || '';
      document.getElementById('fAddr1').value = s.address_line1 || '';
      document.getElementById('fAddr2').value = s.address_line2 || '';
      document.getElementById('fCity').value = s.city || '';
      document.getElementById('fState').value = s.state || '';
      document.getElementById('fZip').value = s.zip_code || '';
      document.getElementById('fVetted').value = s.date_vetted || '';
      document.getElementById('fPreferred').checked = !!s.preferred_vendor;
      document.getElementById('fExpires').value = s.contract_expires_on || '';
      document.getElementById('fTerms').value = s.payment_terms || '';
      document.getElementById('fLeadTime').value = s.lead_time_days || '';
      document.getElementById('fTags').value = s.tags || '';
      document.getElementById('fNotes').value = s.notes || '';
      wireInertLinks();
    });
  }
</script>
</body>
</html>
