<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incoming Shipment — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0" id="pageTitle">Add Incoming Shipment</h5>
    <a href="index.html" class="btn btn-sm btn-outline-secondary">← Back</a>
  </div>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:520px">
    Portfolio demo — this form is visually present but not wired up; Save is inert.
  </div>

  <form style="max-width:520px" onsubmit="return false">
    <div class="mb-3">
      <label class="form-label">Vendor</label>
      <input type="text" id="vendor" class="form-control" placeholder="Vendor name">
    </div>

    <div class="mb-3">
      <label class="form-label">PO #
        <span class="text-muted small">(leave blank if unknown — row will be flagged red)</span>
      </label>
      <input type="text" id="poNumber" class="form-control" placeholder="e.g. 14080">
    </div>

    <div class="row g-3 mb-3">
      <div class="col">
        <label class="form-label">Date</label>
        <input type="date" id="receivedDate" class="form-control">
      </div>
      <div class="col">
        <label class="form-label">Received Time</label>
        <input type="time" id="receivedTime" class="form-control">
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col">
        <label class="form-label">Status</label>
        <select id="status" class="form-select">
          <option value="Pending" selected>Pending</option>
          <option value="Received">Received</option>
          <option value="Awaiting More Boxes">Awaiting More Boxes</option>
        </select>
      </div>
      <div class="col">
        <label class="form-label">Total Boxes</label>
        <input type="number" id="totalBoxes" min="1" class="form-control" placeholder="# of boxes">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea id="notes" rows="2" class="form-control" placeholder="Optional notes"></textarea>
    </div>

    <button type="submit" class="btn btn-primary" data-demo-inert="Save Shipment">Save</button>
    <a href="index.html" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  document.getElementById('receivedDate').value = '2026-07-23';

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    fetch('../data/shipments/index.json').then(r => r.json()).then(d => {
      const entry = d.shipments.find(s => String(s.id) === id);
      if (entry) {
        document.getElementById('pageTitle').textContent = 'Edit Incoming Shipment';
        document.getElementById('vendor').value = entry.vendor || '';
        document.getElementById('poNumber').value = entry.po_number || '';
        document.getElementById('receivedDate').value = entry.received_date || '2026-07-23';
        document.getElementById('receivedTime').value = entry.received_time || '';
        document.getElementById('status').value = entry.status || 'Pending';
        document.getElementById('totalBoxes').value = entry.total_boxes || '';
        document.getElementById('notes').value = entry.notes || '';
      }
    });
  }
</script>
</body>
</html>
