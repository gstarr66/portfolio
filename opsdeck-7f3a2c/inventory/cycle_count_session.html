<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycle Count Session — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0" id="titleHeading">Cycle Count Session</h4>
    <a href="cycle_count.html" class="btn btn-outline-secondary btn-sm">&larr; Sessions</a>
  </div>

  <div id="notFound" class="alert alert-info">
    <p class="mb-1">Session not found in this snapshot.</p>
    <p class="mb-0 text-muted" style="font-size:.85rem">
      The 2026-07-23 database snapshot captured zero <code>cycle_count_sessions</code> rows — no
      cycle counts had been run yet at capture time, so there's no session data to show here.
      Start a session from the <a href="cycle_count.html">Cycle Count</a> list (demo — inert).
    </p>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
// This page intentionally always shows the "not found" state in the demo --
// the live 2026-07-23 snapshot has no cycle_count_sessions rows to display
// (see Clone/data/inventory/cycle_count_session.json). Count-entry / approve
// actions are data-demo-inert in the live app and would be here too.
fetch('../data/inventory/cycle_count_session.json').then(r => r.json()).then(data => {
  const id = new URLSearchParams(location.search).get('id');
  if (id) document.getElementById('titleHeading').textContent = `Cycle Count #${id}`;
});
</script>
</body>
</html>
