<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cycle Count — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Cycle Count</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-primary btn-sm" data-demo-inert="New Cycle Count Session">+ New Session</button>
      <a href="summary.html" class="btn btn-outline-secondary btn-sm">&larr; Inventory</a>
    </div>
  </div>

  <div class="table-responsive">
  <table class="table table-sm align-middle" style="font-size:.85rem">
    <thead>
      <tr>
        <th>Session</th><th>Zone</th><th>Created By</th><th>Created</th>
        <th class="text-end">SKUs</th><th class="text-end">Counted</th><th class="text-end">Variances</th>
        <th>Status</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
fetch('../data/inventory/cycle_count.json').then(r => r.json()).then(data => {
  const tbody = document.getElementById('tbody');
  if (!data.sessions.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">
      No cycle count sessions yet. Click <strong>+ New Session</strong> to start one.
      <div class="mt-1 text-muted" style="font-size:.75rem">${data.note}</div>
    </td></tr>`;
    wireInertLinks();
    return;
  }
  tbody.innerHTML = data.sessions.map(s => {
    const statusCls = s.status === 'closed' ? 'bg-secondary' : (s.status === 'open' ? 'bg-success' : (s.status === 'in_progress' ? 'bg-primary' : 'bg-warning text-dark'));
    return `<tr>
      <td><strong>#${s.id}</strong></td>
      <td>${(s.zone||'').replace('_',' ')}</td>
      <td>${s.created_by || '—'}</td>
      <td><small>${s.created_at || '—'}</small></td>
      <td class="text-end">${s.total_items || 0}</td>
      <td class="text-end">${s.counted_items || 0}</td>
      <td class="text-end ${s.variance_items ? 'text-danger fw-bold' : ''}">${s.variance_items || 0}</td>
      <td><span class="badge ${statusCls}">${(s.status||'').replace('_',' ')}</span></td>
      <td><a href="cycle_count_session.html?id=${s.id}" class="btn btn-sm btn-outline-primary">${s.status === 'open' ? 'Start' : (s.status === 'closed' ? 'View' : 'Continue')}</a></td>
    </tr>`;
  }).join('');
  wireInertLinks();
});
</script>
</body>
</html>
