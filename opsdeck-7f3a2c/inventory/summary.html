<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Inventory</h4>
    <div class="d-flex gap-2">
      <a href="zone_moves.html" class="btn btn-warning btn-sm" id="pendingMovesBtn" style="display:none"></a>
      <button class="btn btn-success btn-sm" data-bs-toggle="modal" data-bs-target="#holdModal">+ Hold Request</button>
    </div>
  </div>

  <div class="alert alert-success alert-dismissible fade show py-2 d-none" id="submitSuccess">
    <span id="submitSuccessMsg"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <form class="row g-2 mb-3" onsubmit="return false">
    <div class="col-auto">
      <input id="searchBox" class="form-control form-control-sm" placeholder="Search SKU / Brand / Name" style="width:240px">
    </div>
    <div class="col-auto">
      <select id="zoneFilter" class="form-select form-select-sm">
        <option value="all">All Zones</option>
        <option value="short_dated">Short-Dated</option>
        <option value="damaged">Damaged</option>
      </select>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary btn-sm" id="btnSearch">Search</button>
      <button class="btn btn-outline-secondary btn-sm" id="btnClear">Clear</button>
    </div>
  </form>

  <div class="summary-bar mb-3" id="summaryBar"></div>

  <div class="table-responsive">
  <table class="table table-sm table-hover align-middle" style="font-size:.85rem">
    <thead>
      <tr>
        <th>Brand</th>
        <th>Item #</th>
        <th style="width:70px">Loc</th>
        <th class="text-end">Main Qty</th>
        <th class="text-end">Short-Dated</th>
        <th class="text-end">Damaged</th>
        <th class="text-end">On Hold</th>
        <th class="text-end">Strategic</th>
        <th class="text-end">Available</th>
        <th class="text-end">3mo Vel</th>
        <th class="text-end">12mo Vel</th>
        <th class="text-end">Min Par</th>
        <th class="text-end">Avg Cost</th>
        <th class="text-end">Avg Sell</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>

</div>

<!-- Hold Request Modal -->
<div class="modal fade" id="holdModal" tabindex="-1">
  <div class="modal-dialog">
    <form id="holdForm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Submit Hold Request</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label form-label-sm">Item # <span class="text-danger">*</span></label>
              <input name="ref" class="form-control form-control-sm" required>
            </div>
            <div class="col-6">
              <label class="form-label form-label-sm">Hold Type</label>
              <select name="hold_type" class="form-select form-select-sm" id="holdTypeSelect">
                <option value="regular">Regular</option>
                <option value="strategic">Strategic</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label form-label-sm">Qty <span class="text-danger">*</span></label>
              <input name="qty" type="number" step="1" class="form-control form-control-sm" required>
            </div>
            <div class="col-6">
              <label class="form-label form-label-sm">Sales Rep</label>
              <input name="sales_rep" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label form-label-sm">Customer Name</label>
              <input name="customer_name" class="form-control form-control-sm">
            </div>
            <div class="col-12">
              <label class="form-label form-label-sm">Reason</label>
              <textarea name="reason" class="form-control form-control-sm" rows="2"></textarea>
            </div>
            <div id="strategicFields" style="display:none" class="col-12 row g-2">
              <div class="col-6">
                <label class="form-label form-label-sm">Guaranteed Qty</label>
                <input name="guaranteed_qty" type="number" step="1" class="form-control form-control-sm">
              </div>
              <div class="col-6">
                <label class="form-label form-label-sm">Guaranteed By Date</label>
                <input name="guaranteed_by_date" type="date" class="form-control form-control-sm">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary btn-sm">Submit Request</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
let DATA = null;

fetch('../data/inventory/summary.json').then(r => r.json()).then(data => {
  DATA = data;
  if (data.pending_moves > 0) {
    const btn = document.getElementById('pendingMovesBtn');
    btn.style.display = '';
    btn.textContent = `⚠ ${data.pending_moves} Zone Move${data.pending_moves !== 1 ? 's' : ''} Pending`;
  }
  render();
});

function num(v) { return v === null || v === undefined ? 0 : v; }

function render() {
  const q = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  const zone = document.getElementById('zoneFilter').value;

  // Merge in any demo hold requests submitted this session so on_hold/available
  // reflect them (approximation -- real hold math only counts approved holds,
  // but a pending demo hold is shown as a note, not folded into qty math).
  let rows = DATA.skus.filter(s => {
    if (q) {
      const hay = (s.ref + ' ' + s.brand + ' ' + s.item_name).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (zone === 'short_dated' && !(s.short_dated_qty > 0)) return false;
    if (zone === 'damaged' && !(s.damaged_qty > 0)) return false;
    return true;
  });

  const totalUnits = rows.reduce((a,s) => a + num(s.total_qty), 0);
  const totalSD = rows.reduce((a,s) => a + num(s.short_dated_qty), 0);
  const totalDam = rows.reduce((a,s) => a + num(s.damaged_qty), 0);
  document.getElementById('summaryBar').innerHTML =
    `<strong>${rows.length}</strong> SKUs &nbsp;|&nbsp;
     <strong>${Math.trunc(totalUnits)}</strong> Total Units &nbsp;|&nbsp;
     <strong>${Math.trunc(totalSD)}</strong> Short-Dated &nbsp;|&nbsp;
     <strong>${Math.trunc(totalDam)}</strong> Damaged`;

  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="14" class="text-center text-muted py-4">No inventory found.</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(s => `
    <tr style="cursor:pointer" onclick="location.href='lot_detail.html?ref=${encodeURIComponent(s.ref)}'">
      <td>${s.brand || '—'}</td>
      <td><strong>${s.ref}</strong></td>
      <td><small class="text-muted">${s.wh_location || '—'}</small></td>
      <td class="text-end">${Math.trunc(s.main_qty)}</td>
      <td class="text-end ${s.short_dated_qty > 0 ? 'text-danger fw-bold' : ''}">${s.short_dated_qty ? Math.trunc(s.short_dated_qty) : '—'}</td>
      <td class="text-end ${s.damaged_qty > 0 ? 'text-warning' : ''}">${s.damaged_qty ? Math.trunc(s.damaged_qty) : '—'}</td>
      <td class="text-end">${s.on_hold ? Math.trunc(s.on_hold) : '—'}</td>
      <td class="text-end">${s.strategic_hold ? Math.trunc(s.strategic_hold) : '—'}</td>
      <td class="text-end fw-bold ${s.available_qty === 0 ? 'text-danger' : ''}">${Math.trunc(s.available_qty)}</td>
      <td class="text-end text-muted">${s.vel_3mo ? s.vel_3mo.toFixed(1) : '—'}</td>
      <td class="text-end text-muted">${s.vel_12mo ? s.vel_12mo.toFixed(1) : '—'}</td>
      <td class="text-end text-muted ${s.min_par && s.available_qty < s.min_par ? 'text-danger' : ''}">${s.min_par ? Math.trunc(s.min_par) : '—'}</td>
      <td class="text-end text-muted">${s.avg_cost ? '$' + s.avg_cost.toFixed(2) : '—'}</td>
      <td class="text-end text-muted">${s.avg_sale_price ? '$' + s.avg_sale_price.toFixed(2) : '—'}</td>
    </tr>`).join('');
}

document.getElementById('btnSearch').addEventListener('click', render);
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('searchBox').value = '';
  document.getElementById('zoneFilter').value = 'all';
  render();
});
document.getElementById('searchBox').addEventListener('keydown', e => { if (e.key === 'Enter') render(); });
document.getElementById('zoneFilter').addEventListener('change', render);

document.getElementById('holdTypeSelect').addEventListener('change', function() {
  document.getElementById('strategicFields').style.display = this.value === 'strategic' ? 'flex' : 'none';
});

// Fake-live: submit a new hold request -> demoStore, stays "pending" (per
// _BUILD_CONVENTIONS.md this is the one write flow for the Inventory module)
document.getElementById('holdForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const fd = new FormData(this);
  const ref = (fd.get('ref') || '').trim();
  const qty = fd.get('qty');
  if (!ref || !qty) { toast('Item # and Qty are required.', 'danger'); return; }

  const nextId = 1000 + demoStore.get('inventory_holds', []).length;
  const row = {
    id: nextId,
    ref,
    hold_type: fd.get('hold_type') || 'regular',
    qty: parseFloat(qty),
    customer_name: (fd.get('customer_name') || '').trim(),
    sales_rep: (fd.get('sales_rep') || '').trim(),
    reason: (fd.get('reason') || '').trim(),
    status: 'pending',
    requested_by: '',
    expires_at: null,
    guaranteed_by_date: fd.get('guaranteed_by_date') || null,
    guaranteed_qty: fd.get('guaranteed_qty') ? parseFloat(fd.get('guaranteed_qty')) : null,
    fulfilled_qty: 0,
    rep_status: '',
    created_at: new Date().toISOString(),
  };
  demoStore.append('inventory_holds', row);

  bootstrap.Modal.getInstance(document.getElementById('holdModal')).hide();
  this.reset();
  document.getElementById('strategicFields').style.display = 'none';

  const box = document.getElementById('submitSuccess');
  document.getElementById('submitSuccessMsg').textContent = `Hold request submitted for ${ref}.`;
  box.classList.remove('d-none');
  toast(`Hold request submitted for ${ref}. Demo — not saved to a server; see it on the Holds page.`, 'success');
});
</script>
</body>
</html>
