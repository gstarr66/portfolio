<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zone Moves — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Zone Move Tasks
      <span class="badge bg-warning text-dark ms-2" id="pendingBadge" style="display:none"></span>
    </h4>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary btn-sm" data-demo-inert="Generate Tasks">Generate Tasks</button>
      <a href="summary.html" class="text-decoration-none btn btn-outline-secondary btn-sm">&larr; Inventory</a>
    </div>
  </div>

  <div class="mb-3">
    <button class="btn btn-sm btn-dark" id="btnPending">Pending</button>
    <button class="btn btn-sm btn-outline-secondary" id="btnCompleted">Completed</button>
  </div>

  <p class="text-muted small">Items expiring within 30 days must be physically moved to the Short-Dated area. Click <strong>Generate Tasks</strong> to scan for new lots needing movement. Mark each task complete after the physical move is done.</p>

  <div class="table-responsive">
  <table class="table table-sm align-middle" style="font-size:.85rem">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
let DATA = null;
let statusFilter = 'pending';
const SNAPSHOT_DATE = new Date('2026-07-23T00:00:00');

fetch('../data/inventory/zone_moves.json').then(r => r.json()).then(data => {
  DATA = data;
  if (data.pending_count > 0) {
    const b = document.getElementById('pendingBadge');
    b.style.display = '';
    b.textContent = data.pending_count + ' Pending';
  }
  render();
});

function fmtDate(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.slice(0,10).split('-');
  return `${m}/${d}/${y}`;
}
function daysLeft(iso) {
  if (!iso) return null;
  return Math.round((new Date(iso + 'T00:00:00') - SNAPSHOT_DATE) / 86400000);
}

function render() {
  const tasks = statusFilter === 'pending' ? DATA.pending : DATA.completed;

  document.getElementById('thead').innerHTML = `
    <tr>
      <th>Item #</th><th>Lot</th><th>Exp Date</th><th class="text-end">Qty</th>
      <th>From</th><th>To</th><th>Triggered</th>
      ${statusFilter === 'completed' ? '<th>Completed By</th><th>Completed At</th>' : '<th>Action</th>'}
    </tr>`;

  const tbody = document.getElementById('tbody');
  if (!tasks.length) {
    const msg = statusFilter === 'pending'
      ? 'No pending move tasks. Click <strong>Generate Tasks</strong> to check for expiring lots. ' +
        '<div class="mt-1 text-muted" style="font-size:.75rem">The 2026-07-23 snapshot captured zero zone_move_tasks rows — this feature had not generated any tasks yet at capture time.</div>'
      : 'No completed tasks found.';
    tbody.innerHTML = `<tr><td colspan="9" class="text-center text-muted py-4">${msg}</td></tr>`;
    return;
  }

  tbody.innerHTML = tasks.map(t => {
    const dl = daysLeft(t.exp_date);
    const rowCls = dl !== null && dl <= 7 ? 'table-danger' : (dl !== null && dl <= 14 ? 'table-warning' : '');
    const dlBadge = dl !== null
      ? `<span class="badge ${dl <= 7 ? 'bg-danger' : (dl <= 14 ? 'bg-warning text-dark' : 'bg-secondary')} ms-1">${dl}d</span>` : '';
    const tail = statusFilter === 'completed'
      ? `<td>${t.completed_by || '—'}</td><td><small class="text-muted">${t.completed_at || '—'}</small></td>`
      : `<td><button class="btn btn-success btn-sm" data-demo-inert="Mark Move Complete">Mark Complete</button></td>`;
    return `<tr class="${rowCls}">
      <td><strong>${t.ref}</strong></td>
      <td>${t.lot || '—'}</td>
      <td>${fmtDate(t.exp_date)}${dlBadge}</td>
      <td class="text-end">${Math.trunc(t.qty)}</td>
      <td><span class="badge bg-success">${t.from_zone.replace('_',' ')}</span></td>
      <td><span class="badge bg-danger">${t.to_zone.replace('_',' ')}</span></td>
      <td><small class="text-muted">${fmtDate(t.triggered_at)}</small></td>
      ${tail}
    </tr>`;
  }).join('');

  wireInertLinks();
}

document.getElementById('btnPending').addEventListener('click', function() {
  statusFilter = 'pending';
  this.className = 'btn btn-sm btn-dark';
  document.getElementById('btnCompleted').className = 'btn btn-sm btn-outline-secondary';
  render();
});
document.getElementById('btnCompleted').addEventListener('click', function() {
  statusFilter = 'completed';
  this.className = 'btn btn-sm btn-dark';
  document.getElementById('btnPending').className = 'btn btn-sm btn-outline-secondary';
  render();
});
</script>
</body>
</html>
