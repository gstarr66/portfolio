<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Outbound Scans — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <h4 class="mb-3">Outbound Scans</h4>

  <div class="alert alert-secondary small py-2 mb-3" id="scopeNote"></div>

  <!-- Filters -->
  <form class="row g-2 mb-3" id="filterForm" onsubmit="return false">
    <div class="col-auto">
      <label class="form-label mb-0 small text-muted">Date</label>
      <input type="date" id="dateInput" class="form-control form-control-sm" list="dateOptions">
      <datalist id="dateOptions"></datalist>
    </div>
    <div class="col-auto">
      <label class="form-label mb-0 small text-muted">Invoice #</label>
      <input type="text" id="invoiceInput" placeholder="Filter by invoice"
             class="form-control form-control-sm" style="min-width:200px">
    </div>
    <div class="col-auto align-self-end">
      <button type="submit" class="btn btn-sm btn-primary" id="applyBtn">Apply</button>
      <button type="button" class="btn btn-sm btn-outline-secondary ms-1" id="todayBtn">Default Date</button>
    </div>
  </form>

  <!-- Summary bar -->
  <div class="summary-bar d-flex gap-4">
    <span><strong id="sumCount">0</strong> <span class="text-muted">scan records</span></span>
    <span><strong id="sumQty">0</strong> <span class="text-muted">total units</span></span>
    <span class="text-muted small align-self-center" id="sumDate"></span>
  </div>

  <div id="tableWrap"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;

  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function srcBadge(source) {
    if (source === 'live') return '<span class="badge badge-live">live</span>';
    if (source === 'mongodb') return '<span class="badge badge-mongo">sync</span>';
    return '<span class="badge badge-import">imp</span>';
  }

  function render() {
    const date = document.getElementById('dateInput').value;
    const invFilter = document.getElementById('invoiceInput').value.trim().toLowerCase();

    document.getElementById('sumDate').textContent = date;
    history.replaceState(null, '', '?date=' + encodeURIComponent(date) +
      (invFilter ? '&invoice=' + encodeURIComponent(invFilter) : ''));

    const bucket = DATA.dates[date];
    const wrap = document.getElementById('tableWrap');

    if (!bucket) {
      document.getElementById('sumCount').textContent = '0';
      document.getElementById('sumQty').textContent = '0';
      wrap.innerHTML = `<div class="alert alert-info">No outbound scans shipped with this demo for ${escHtml(date)}.
        Try one of the sample dates: ${DATA.available_dates.join(', ')}.</div>`;
      return;
    }

    let scans = bucket.scans;
    if (invFilter) {
      scans = scans.filter(s => (s.invoice || '').toLowerCase().includes(invFilter));
    }

    const totalQty = scans.reduce((sum, s) => sum + (s.qty || 0), 0);
    document.getElementById('sumCount').textContent = scans.length;
    document.getElementById('sumQty').textContent = totalQty.toFixed(0);

    if (!scans.length) {
      wrap.innerHTML = `<div class="alert alert-info">No outbound scans found for ${escHtml(date)}` +
        (invFilter ? ` with invoice "${escHtml(invFilter)}"` : '') + `.</div>`;
      return;
    }

    wrap.innerHTML = `
      <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered align-middle small">
          <thead>
            <tr>
              <th>Time (ET)</th><th>SKU</th><th>Lot</th><th>Exp Date</th><th>Qty</th>
              <th>Invoice</th><th>Scanned By</th><th>Src</th>
            </tr>
          </thead>
          <tbody>
            ${scans.map(s => `
              <tr>
                <td class="text-nowrap">${escHtml(s.time || '')}</td>
                <td><strong>${escHtml(s.ref || '—')}</strong></td>
                <td>${escHtml(s.lot || '—')}</td>
                <td class="text-nowrap">${escHtml(s.exp_date || '—')}</td>
                <td>${s.qty != null ? s.qty : '—'}</td>
                <td>${escHtml(s.invoice || '—')}</td>
                <td>${escHtml(s.scanned_by || '—')}</td>
                <td>${srcBadge(s.source)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  fetch('../data/warehouse/outbound.json').then(r => r.json()).then(d => {
    DATA = d;
    document.getElementById('scopeNote').textContent = d.note;

    const dl = document.getElementById('dateOptions');
    dl.innerHTML = d.available_dates.map(dt => `<option value="${dt}">`).join('');

    const params = new URLSearchParams(window.location.search);
    document.getElementById('dateInput').value = params.get('date') || d.default_date;
    document.getElementById('invoiceInput').value = params.get('invoice') || '';

    render();
    document.getElementById('applyBtn').addEventListener('click', render);
    document.getElementById('todayBtn').addEventListener('click', () => {
      document.getElementById('dateInput').value = d.default_date;
      document.getElementById('invoiceInput').value = '';
      render();
    });
  });
</script>
</body>
</html>
