<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Inbound — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Inbound Scan — Start Session</h5>
    <a href="inbound.html" class="btn btn-sm btn-outline-secondary">← Scan Log</a>
  </div>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:480px">
    Portfolio demo — starting a session here creates a fake in-browser session
    (stored via <code>demoStore</code>, not a server) and takes you to the live
    scan screen where you can simulate scanning a few real SKUs.
  </div>

  <div id="errorBox" class="alert alert-danger" style="display:none;max-width:480px"></div>

  <form id="start-form" style="max-width:480px">

    <div class="mb-3">
      <label class="form-label fw-semibold">PO Number <span class="text-danger">*</span></label>
      <input type="text" id="po-input" class="form-control"
             placeholder="e.g. 14080" autocomplete="off" required autofocus>
      <div class="form-text text-muted" id="po-hint"></div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Supplier</label>
      <input type="text" id="supplier-input" class="form-control"
             placeholder="Auto-fills from PO, or enter manually">
    </div>

    <div class="row g-3 mb-3">
      <div class="col">
        <label class="form-label fw-semibold">Box #</label>
        <input type="number" id="box-current" class="form-control" min="1" placeholder="e.g. 1">
      </div>
      <div class="col">
        <label class="form-label fw-semibold">of Total Boxes</label>
        <input type="number" id="box-total" class="form-control" min="1" placeholder="e.g. 12">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Checker</label>
      <input type="text" class="form-control bg-light" value="Gary Starr (Demo)" readonly>
    </div>

    <button type="submit" class="btn btn-success btn-lg w-100">Start Scanning</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  const poInput       = document.getElementById('po-input');
  const supplierInput = document.getElementById('supplier-input');
  const poHint         = document.getElementById('po-hint');
  let sessions = [];
  let lookupTimer = null;

  fetch('../data/warehouse/scan_sessions.json').then(r => r.json()).then(d => {
    sessions = d.sessions;
  });

  // Fake "PO lookup" auto-fill: looks up supplier from the real seed sessions
  // (a live server would query purchase_orders instead).
  poInput.addEventListener('input', function () {
    clearTimeout(lookupTimer);
    const val = this.value.trim();
    if (val.length < 3) { poHint.textContent = ''; return; }
    lookupTimer = setTimeout(() => {
      const match = sessions.find(s => s.po_number === val);
      if (match && match.supplier) {
        supplierInput.value = match.supplier;
        poHint.textContent = '✓ Supplier loaded from PO (demo lookup)';
        poHint.className = 'form-text text-success';
      } else {
        poHint.textContent = 'PO not found in demo data — enter supplier manually if needed';
        poHint.className = 'form-text text-muted';
      }
    }, 400);
  });

  document.getElementById('start-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const poNumber = poInput.value.trim();
    if (!poNumber) {
      const box = document.getElementById('errorBox');
      box.textContent = 'PO Number is required.';
      box.style.display = 'block';
      return;
    }

    const newSessions = window.demoStore.get('warehouse:sessions_new', []);
    const maxSeedId = sessions.length ? Math.max(...sessions.map(s => s.id)) : 6;
    const maxNewId  = newSessions.length ? Math.max(...newSessions.map(s => s.id)) : maxSeedId;
    const id = maxNewId + 1;

    const boxCurrent = document.getElementById('box-current').value;
    const boxTotal   = document.getElementById('box-total').value;

    const session = {
      id: id,
      po_number: poNumber,
      supplier: supplierInput.value.trim() || null,
      scanned_by: 'Gary Starr (Demo)',
      box_current: boxCurrent ? parseInt(boxCurrent, 10) : null,
      box_total: boxTotal ? parseInt(boxTotal, 10) : null,
      scan_date: new Date().toISOString().slice(0, 10),
      status: 'open',
      physical_count_verified: false,
    };
    window.demoStore.append('warehouse:sessions_new', session);
    window.location.href = 'scan_live.html?session_id=' + id;
  });
</script>
</body>
</html>
