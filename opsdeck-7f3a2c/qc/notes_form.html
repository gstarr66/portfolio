<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QC Note Template — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0" id="pageTitle">Add QC Note Template</h5>
    <a href="notes.html" class="btn btn-sm btn-outline-secondary">← Back</a>
  </div>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:560px">
    Portfolio demo — this form is visually present but not wired up; Save is inert.
  </div>

  <form style="max-width:560px" onsubmit="return false">
    <div class="mb-3">
      <label class="form-label">Ref EA</label>
      <input type="text" id="refEa" class="form-control" placeholder="e.g. 1016E">
    </div>
    <div class="mb-3">
      <label class="form-label">Ref Bx</label>
      <input type="text" id="refBx" class="form-control" placeholder="e.g. 1016B">
    </div>
    <div class="mb-3">
      <label class="form-label">Note <span class="text-danger">*</span></label>
      <textarea id="note" rows="3" class="form-control" placeholder="QC note text…"></textarea>
    </div>
    <button type="submit" class="btn btn-primary" data-demo-inert="Save Note Template">Save</button>
    <a href="notes.html" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    fetch('../data/qc/notes.json').then(r => r.json()).then(d => {
      const entry = d.notes.find(n => String(n.id) === id);
      if (entry) {
        document.getElementById('pageTitle').textContent = 'Edit QC Note Template';
        document.getElementById('refEa').value = entry.ref_ea || '';
        document.getElementById('refBx').value = entry.ref_bx || '';
        document.getElementById('note').value = entry.note || '';
      }
    });
  }
</script>
</body>
</html>
