<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warehouse Locations — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">Warehouse Locations</h5>
    <a href="locations_form.html" class="btn btn-sm btn-success">+ Add</a>
  </div>

  <form class="d-flex gap-2 mb-3" style="max-width:400px" onsubmit="return false">
    <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="Search item code or location…">
    <button class="btn btn-sm btn-primary" id="searchBtn">Search</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" id="clearBtn">Clear</button>
  </form>

  <div class="small text-muted mb-2" id="countLine"></div>

  <div class="table-responsive">
    <table class="table table-sm table-hover table-bordered align-middle" style="font-size:0.82rem">
      <thead class="table-dark">
        <tr><th>Item Code</th><th>Location</th><th style="width:100px"></th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  let LOCATIONS = [];

  function render() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    let rows = LOCATIONS;
    if (q) {
      rows = rows.filter(l => l.item_code.toLowerCase().includes(q) || l.location.toLowerCase().includes(q));
    }
    document.getElementById('countLine').textContent =
      rows.length + ' entries' + (q ? ` matching "${q}"` : '');

    // Cap rendered rows for browser performance on an unfiltered 4,926-row table;
    // the real page has no pagination either, but a live search narrows this fast.
    const capped = rows.slice(0, 500);
    document.getElementById('tbody').innerHTML = capped.map(loc => `
      <tr>
        <td><strong>${escHtml(loc.item_code)}</strong></td>
        <td>${escHtml(loc.location)}</td>
        <td class="text-nowrap">
          <a href="locations_form.html?id=${loc.id}" class="btn btn-sm btn-outline-primary py-0 px-2">Edit</a>
          <button class="btn btn-sm btn-outline-danger py-0 px-2" data-demo-inert="Delete Location">Del</button>
        </td>
      </tr>`).join('') + (rows.length > capped.length
        ? `<tr><td colspan="3" class="text-center text-muted small py-2">Showing first 500 of ${rows.length} matches — narrow your search to see more.</td></tr>`
        : '');
    window.wireInertLinks();
  }

  fetch('../data/qc/locations.json').then(r => r.json()).then(d => {
    LOCATIONS = d.locations;
    render();
    document.getElementById('searchBtn').addEventListener('click', render);
    document.getElementById('searchBox').addEventListener('input', render);
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchBox').value = '';
      render();
    });
  });
</script>
</body>
</html>
