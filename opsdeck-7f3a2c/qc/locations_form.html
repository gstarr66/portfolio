<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warehouse Location — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0" id="pageTitle">Add Warehouse Location</h5>
    <a href="locations.html" class="btn btn-sm btn-outline-secondary">← Back</a>
  </div>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:400px">
    Portfolio demo — this form is visually present but not wired up; Save is inert.
  </div>

  <form style="max-width:400px" onsubmit="return false">
    <div class="mb-3">
      <label class="form-label">Item Code <span class="text-danger">*</span></label>
      <input type="text" id="itemCode" class="form-control" placeholder="e.g. 1016E">
    </div>
    <div class="mb-3">
      <label class="form-label">Location <span class="text-danger">*</span></label>
      <input type="text" id="location" class="form-control" placeholder="e.g. A11, A12">
    </div>
    <button type="submit" class="btn btn-primary" data-demo-inert="Save Location">Save</button>
    <a href="locations.html" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    fetch('../data/qc/locations.json').then(r => r.json()).then(d => {
      const entry = d.locations.find(l => String(l.id) === id);
      if (entry) {
        document.getElementById('pageTitle').textContent = 'Edit Warehouse Location';
        document.getElementById('itemCode').value = entry.item_code;
        document.getElementById('location').value = entry.location;
      }
    });
  }
</script>
</body>
</html>
