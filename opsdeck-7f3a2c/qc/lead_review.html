<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Review — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div id="notFound" class="alert alert-info" style="display:none">
    No QC batches found for this PO / date. <a href="lead.html">← Back</a>
  </div>

  <div id="page" style="display:none">

    <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
      <div>
        <h5 class="mb-1">Lead Review</h5>
        <div class="small text-muted" id="hdrLine"></div>
      </div>
      <a id="backLink" href="lead.html" class="btn btn-sm btn-outline-secondary">← Back</a>
    </div>

    <div class="d-flex flex-wrap gap-2 mb-3" id="batchBadges"></div>

    <div id="notAllSubmitted" class="alert alert-warning" style="max-width:600px;display:none">
      Not all checker batches are submitted yet. You can review but cannot finalize until all are submitted.
    </div>

    <div class="summary-bar d-flex flex-wrap gap-4 mb-3" id="summaryBar"></div>

    <div class="mb-2">
      <button class="btn btn-sm btn-success" id="finalizeBtn" data-demo-inert="Complete PO &amp; Update Inventory">
        Complete PO &amp; Update Inventory
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-sm table-hover table-bordered align-middle" style="font-size:0.76rem; min-width:1400px">
        <thead class="table-dark">
          <tr>
            <th>#</th><th>Item Code</th><th>Brand</th><th>Lot</th><th>Exp Date</th><th class="text-center">SD</th>
            <th>W/H Loc</th><th>Checker(s)</th><th class="text-center">Scanned</th><th class="text-center">Accepted</th>
            <th class="text-center">Rejected</th><th class="text-center">Damaged</th><th>Zone</th>
            <th>Rejection Reason</th><th>Notes</th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function fmt(n) { return (n || n === 0) ? Number(n).toFixed(0) : '0'; }

  const params  = new URLSearchParams(window.location.search);
  const selDate = params.get('date') || '';
  const poNum   = params.get('po') || '';

  fetch('../data/qc/lead_review.json').then(r => r.json()).then(d => {
    const review = d[selDate + '|' + poNum];
    if (!review) {
      document.getElementById('notFound').style.display = 'block';
      return;
    }
    document.getElementById('page').style.display = 'block';
    document.getElementById('backLink').href = 'lead.html?date=' + encodeURIComponent(selDate);

    const statusBadge = review.is_finalized ? '<span class="badge bg-secondary ms-2">Finalized</span>'
      : review.all_submitted ? '<span class="badge bg-success ms-2">Ready to Complete</span>'
      : '<span class="badge bg-warning text-dark ms-2">Checkers In Progress</span>';

    document.getElementById('hdrLine').innerHTML =
      '<strong>PO ' + escHtml(poNum) + '</strong>' + (review.supplier ? ' &mdash; ' + escHtml(review.supplier) : '') +
      ' &mdash; ' + escHtml(selDate) + statusBadge;

    document.getElementById('batchBadges').innerHTML = review.batches.map(b => {
      const cls = b.status === 'finalized' ? 'bg-secondary' : (b.status === 'submitted' ? 'bg-success' : 'bg-warning text-dark');
      return `<span class="badge ${cls}">${escHtml(b.checker_name)} — ${escHtml(b.status.charAt(0).toUpperCase() + b.status.slice(1))}</span>`;
    }).join('');

    if (!review.all_submitted && !review.is_finalized) {
      document.getElementById('notAllSubmitted').style.display = 'block';
    }

    const items = review.items;
    const totalScanned = items.reduce((s, i) => s + i.scanned_qty, 0);
    const totalAccepted = items.reduce((s, i) => s + i.accepted_qty, 0);
    const totalRejected = items.reduce((s, i) => s + i.rejected_qty, 0);
    const sd3Count = items.filter(i => i.sd_lt3mo && i.accepted_qty > 0).length;

    document.getElementById('summaryBar').innerHTML = `
      <span><strong>${items.length}</strong> <span class="text-muted">line items</span></span>
      <span><strong>${fmt(totalScanned)}</strong> <span class="text-muted">scanned</span></span>
      <span class="text-success"><strong>${fmt(totalAccepted)}</strong> <span class="text-muted">accepted</span></span>
      <span class="${totalRejected > 0 ? 'text-danger' : 'text-muted'}"><strong>${fmt(totalRejected)}</strong> <span>rejected</span></span>
      ${sd3Count ? `<span class="text-danger"><strong>${sd3Count}</strong> <span>SD &lt;3mo items</span></span>` : ''}`;

    const finalizeBtn = document.getElementById('finalizeBtn');
    if (review.is_finalized) finalizeBtn.style.display = 'none';
    else if (!review.all_submitted) finalizeBtn.disabled = true;

    document.getElementById('itemsBody').innerHTML = items.map((item, i) => {
      const sdBadge = item.sd_lt3mo ? '<span class="badge bg-danger">&lt;3mo</span>'
        : item.sd_3to18mo ? '<span class="badge bg-warning text-dark">3-18mo</span>' : '';
      const zone = item.sd_lt3mo ? 'Short-Dated' : 'Main';
      return `
        <tr class="${item.sd_lt3mo ? 'table-danger' : (item.sd_3to18mo ? 'table-warning' : '')}">
          <td class="text-muted">${i + 1}</td>
          <td><strong>${escHtml(item.ref || '—')}</strong></td>
          <td>${escHtml(item.brand || '—')}</td>
          <td>${escHtml(item.lot || '—')}</td>
          <td class="text-nowrap">${escHtml(item.exp_date || '—')}</td>
          <td class="text-center">${sdBadge}</td>
          <td class="small text-muted">${escHtml(item.wh_location || '—')}</td>
          <td class="small text-muted">${escHtml(item.checkers_str || '—')}</td>
          <td class="text-center">${fmt(item.scanned_qty)}</td>
          <td class="text-center">${fmt(item.accepted_qty)}</td>
          <td class="text-center">${fmt(item.rejected_qty)}</td>
          <td class="text-center">${fmt(item.damaged_qty)}</td>
          <td><span class="small text-muted">${zone}</span></td>
          <td class="small">${escHtml(item.rejection_reason || '—')}</td>
          <td class="small">${escHtml(item.notes || '—')}</td>
        </tr>`;
    }).join('');

    // Note: finalizeBtn is static in this page's initial HTML (just hidden
    // inside #page), so site.js's own nav-load wireInertLinks() call already
    // wires it.
  });
</script>
</body>
</html>
