<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QC Lead — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <h5 class="mb-3">QC Lead</h5>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:600px">
    Portfolio demo — scoped to the 3 dates with real QC batches in the
    2026-07-23 snapshot.
  </div>

  <div class="card mb-3" style="max-width:340px">
    <div class="card-body py-2">
      <form class="d-flex gap-2 align-items-end" onsubmit="return false">
        <div class="flex-grow-1">
          <label class="form-label mb-1 small text-muted">Date</label>
          <input type="date" id="dateInput" class="form-control form-control-sm" list="dateOptions">
          <datalist id="dateOptions"></datalist>
        </div>
        <button class="btn btn-sm btn-primary" id="loadBtn">Load</button>
      </form>
    </div>
  </div>

  <div id="tableWrap"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function fmt(n) { return (n || n === 0) ? Number(n).toFixed(0) : '—'; }

  function render() {
    const date = document.getElementById('dateInput').value;
    history.replaceState(null, '', '?date=' + encodeURIComponent(date));
    const pos = DATA.dates[date] || [];
    const wrap = document.getElementById('tableWrap');

    if (!pos.length) {
      wrap.innerHTML = `<div class="alert alert-info" style="max-width:500px">
        No QC batches found for ${escHtml(date)} in this demo. Try: ${DATA.available_dates.join(', ')}.</div>`;
      return;
    }

    wrap.innerHTML = `
      <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered align-middle" style="font-size:0.83rem">
          <thead class="table-dark">
            <tr>
              <th>PO #</th><th>Supplier</th><th>Checkers</th><th class="text-center">Boxes Completed</th>
              <th class="text-center">Scanned</th><th class="text-center">Accepted</th><th class="text-center">Rejected</th>
              <th class="text-center">SD &lt;3mo</th><th class="text-center">SD 3-18mo</th><th>Status</th><th></th>
            </tr>
          </thead>
          <tbody>
            ${pos.map(po => {
              let boxesCell;
              if (po.total_boxes) {
                const over = po.submitted_count > po.total_boxes;
                const cls = over ? 'text-warning' : (po.submitted_count === po.total_boxes ? 'text-success' : '');
                boxesCell = `<span class="fw-bold ${cls}">${po.submitted_count} / ${po.total_boxes}</span>`;
              } else {
                boxesCell = `${po.submitted_count} <span class="text-muted small">/ ?</span>`;
              }
              const statusBadge = po.lead_status === 'finalized' ? '<span class="badge bg-secondary">Finalized</span>'
                : po.lead_status === 'ready' ? '<span class="badge bg-success">Ready</span>'
                : '<span class="badge bg-warning text-dark">In Progress</span>';
              const btnLabel = po.lead_status === 'finalized' ? 'View' : 'Review';
              const btnClass = po.lead_status === 'finalized' ? 'btn-outline-secondary' : 'btn-primary';
              return `
                <tr>
                  <td><strong>${escHtml(po.po_number)}</strong></td>
                  <td>${escHtml(po.supplier || '—')}</td>
                  <td class="small text-muted">${escHtml(po.checkers || '—')}</td>
                  <td class="text-center">${boxesCell}</td>
                  <td class="text-center">${fmt(po.total_scanned)}</td>
                  <td class="text-center fw-bold text-success">${fmt(po.total_accepted)}</td>
                  <td class="text-center fw-bold ${po.total_rejected > 0 ? 'text-danger' : 'text-muted'}">${fmt(po.total_rejected)}</td>
                  <td class="text-center fw-bold ${po.total_sd_lt3mo > 0 ? 'text-danger' : 'text-muted'}">${po.total_sd_lt3mo ? fmt(po.total_sd_lt3mo) : '—'}</td>
                  <td class="text-center fw-bold ${po.total_sd_3to18mo > 0 ? 'text-warning' : 'text-muted'}">${po.total_sd_3to18mo ? fmt(po.total_sd_3to18mo) : '—'}</td>
                  <td>${statusBadge}</td>
                  <td><a href="lead_review.html?date=${encodeURIComponent(date)}&po=${encodeURIComponent(po.po_number)}"
                         class="btn btn-sm ${btnClass} py-0 px-2">${btnLabel}</a></td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }

  fetch('../data/qc/lead.json').then(r => r.json()).then(d => {
    DATA = d;
    const dl = document.getElementById('dateOptions');
    dl.innerHTML = d.available_dates.map(dt => `<option value="${dt}">`).join('');
    const params = new URLSearchParams(window.location.search);
    document.getElementById('dateInput').value = params.get('date') || d.available_dates[d.available_dates.length - 1];
    render();
    document.getElementById('loadBtn').addEventListener('click', render);
  });
</script>
</body>
</html>
