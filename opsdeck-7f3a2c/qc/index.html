<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QC Tool — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <h4 class="mb-3">QC Tool</h4>

  <div class="alert alert-secondary small py-2 mb-3" style="max-width:600px">
    Portfolio demo — scoped to the 3 dates in the 2026-07-23 snapshot that had
    real QC activity (checkers scanning inbound freight tagged with a PO
    number). Pick a date below to see the same date → checker → PO drill-down
    the live app uses.
  </div>

  <!-- Step 1: Date -->
  <div class="card mb-3" style="max-width:480px">
    <div class="card-body">
      <form class="row g-2 align-items-end" onsubmit="return false">
        <div class="col">
          <label class="form-label mb-1 small text-muted">Date</label>
          <input type="date" id="dateInput" class="form-control form-control-sm" list="dateOptions">
          <datalist id="dateOptions"></datalist>
        </div>
        <div class="col-auto">
          <button class="btn btn-sm btn-primary" id="loadBtn">Load</button>
        </div>
      </form>
    </div>
  </div>

  <div id="checkerWrap"></div>
  <div id="posWrap"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;

  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render() {
    const date = document.getElementById('dateInput').value;
    const params = new URLSearchParams(window.location.search);
    const selectedChecker = params.get('checker') || '';
    history.replaceState(null, '', '?date=' + encodeURIComponent(date) +
      (selectedChecker ? '&checker=' + encodeURIComponent(selectedChecker) : ''));

    const bucket = DATA.dates[date];
    const checkerWrap = document.getElementById('checkerWrap');
    const posWrap = document.getElementById('posWrap');

    if (!bucket || !bucket.checkers.length) {
      checkerWrap.innerHTML = `<div class="alert alert-info" style="max-width:480px">
        No inbound scans found for ${escHtml(date)} in this demo.
        Try one of: ${DATA.available_dates.join(', ')}.</div>`;
      posWrap.innerHTML = '';
      return;
    }

    checkerWrap.innerHTML = `
      <div class="card mb-3" style="max-width:480px">
        <div class="card-body">
          <p class="small text-muted mb-2">Select checker for <strong>${escHtml(date)}</strong></p>
          <div class="d-flex flex-wrap gap-2">
            ${bucket.checkers.map(c => `
              <a href="?date=${encodeURIComponent(date)}&checker=${encodeURIComponent(c)}"
                 class="btn btn-sm ${c === selectedChecker ? 'btn-dark' : 'btn-outline-secondary'} checker-link"
                 data-checker="${escHtml(c)}">${escHtml(c)}</a>`).join('')}
          </div>
        </div>
      </div>`;

    checkerWrap.querySelectorAll('.checker-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        history.replaceState(null, '', a.getAttribute('href'));
        render();
      });
    });

    if (!selectedChecker) { posWrap.innerHTML = ''; return; }

    const pos = bucket.pos_by_checker[selectedChecker] || [];
    if (!pos.length) {
      posWrap.innerHTML = `<div class="alert alert-info" style="max-width:480px">
        No POs found for ${escHtml(selectedChecker)} on ${escHtml(date)}.</div>`;
      return;
    }

    posWrap.innerHTML = `
      <div class="card mb-3" style="max-width:600px">
        <div class="card-body">
          <p class="small text-muted mb-2">POs for <strong>${escHtml(selectedChecker)}</strong> on ${escHtml(date)}</p>
          <table class="table table-sm table-hover mb-0">
            <thead><tr><th>PO #</th><th>Supplier</th><th></th></tr></thead>
            <tbody>
              ${pos.map(([poNum, vendor]) => `
                <tr>
                  <td><strong>${escHtml(poNum)}</strong></td>
                  <td>${escHtml(vendor || '—')}</td>
                  <td><a href="batch.html?date=${encodeURIComponent(date)}&checker=${encodeURIComponent(selectedChecker)}&po=${encodeURIComponent(poNum)}"
                         class="btn btn-sm btn-success">Start QC</a></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  }

  fetch('../data/qc/index.json').then(r => r.json()).then(d => {
    DATA = d;
    const dl = document.getElementById('dateOptions');
    dl.innerHTML = d.available_dates.map(dt => `<option value="${dt}">`).join('');

    const params = new URLSearchParams(window.location.search);
    document.getElementById('dateInput').value = params.get('date') || d.available_dates[d.available_dates.length - 1];

    render();
    document.getElementById('loadBtn').addEventListener('click', () => {
      history.replaceState(null, '', '?date=' + encodeURIComponent(document.getElementById('dateInput').value));
      render();
    });
  });
</script>
</body>
</html>
