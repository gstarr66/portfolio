<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QC Note Templates — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">QC Note Templates</h5>
    <a href="notes_form.html" class="btn btn-sm btn-success">+ Add</a>
  </div>

  <form class="d-flex gap-2 mb-3" style="max-width:400px" onsubmit="return false">
    <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="Search SKU or note…">
    <button class="btn btn-sm btn-primary" id="searchBtn">Search</button>
    <button type="button" class="btn btn-sm btn-outline-secondary" id="clearBtn">Clear</button>
  </form>

  <div class="small text-muted mb-2" id="countLine"></div>

  <div class="table-responsive">
    <table class="table table-sm table-hover table-bordered align-middle" style="font-size:0.82rem">
      <thead class="table-dark">
        <tr><th>Ref EA</th><th>Ref Bx</th><th>Note</th><th style="width:100px"></th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  let NOTES = [];

  function render() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    let rows = NOTES;
    if (q) {
      rows = rows.filter(n =>
        (n.ref_ea || '').toLowerCase().includes(q) ||
        (n.ref_bx || '').toLowerCase().includes(q) ||
        (n.note || '').toLowerCase().includes(q));
    }
    document.getElementById('countLine').textContent =
      rows.length + ' entries' + (q ? ` matching "${q}"` : '');

    document.getElementById('tbody').innerHTML = rows.map(n => `
      <tr>
        <td>${escHtml(n.ref_ea || '—')}</td>
        <td>${escHtml(n.ref_bx || '—')}</td>
        <td>${escHtml(n.note)}</td>
        <td class="text-nowrap">
          <a href="notes_form.html?id=${n.id}" class="btn btn-sm btn-outline-primary py-0 px-2">Edit</a>
          <button class="btn btn-sm btn-outline-danger py-0 px-2" data-demo-inert="Delete Note Template">Del</button>
        </td>
      </tr>`).join('');
    window.wireInertLinks();
  }

  fetch('../data/qc/notes.json').then(r => r.json()).then(d => {
    NOTES = d.notes;
    render();
    document.getElementById('searchBtn').addEventListener('click', render);
    document.getElementById('searchBox').addEventListener('input', render);
    document.getElementById('clearBtn').addEventListener('click', () => {
      document.getElementById('searchBox').value = '';
      render();
    });
  });
</script>
</body>
</html>
