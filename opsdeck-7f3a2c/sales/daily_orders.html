<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Order List — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">Daily Order List</h5>
    <form class="d-flex gap-2 align-items-center flex-wrap" onsubmit="return false">
      <input type="date" id="dateFilter" class="form-control form-control-sm" style="width:150px">
      <input type="text" id="searchBox" class="form-control form-control-sm"
             style="width:200px" placeholder="Invoice #, customer, rep…">
      <button class="btn btn-sm btn-primary" onclick="render()">Search</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" id="btnClear">Clear</button>
    </form>
  </div>

  <div class="text-muted small mb-2" id="countLine">Loading…</div>

  <div class="table-responsive">
  <table class="table table-sm table-hover align-middle" style="font-size:0.82rem">
    <thead>
      <tr>
        <th>Date</th>
        <th>#</th>
        <th>Invoice</th>
        <th>Customer</th>
        <th>Rep</th>
        <th>Ship Method</th>
        <th>Status</th>
        <th>Ship Date</th>
        <th>Tracking</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;

  fetch('../data/sales/daily_orders.json').then(r => r.json()).then(d => {
    DATA = d;
    render();
  });

  function statusBadge(status) {
    if (status === 'shipped')  return '<span class="badge bg-success" style="font-size:.68rem">Shipped</span>';
    if (status === 'packed')   return '<span class="badge bg-info text-dark" style="font-size:.68rem">Packed</span>';
    if (status === 'packing')  return '<span class="badge bg-warning text-dark" style="font-size:.68rem">Packing</span>';
    if (status === 'approved') return '<span class="badge bg-secondary" style="font-size:.68rem">Approved</span>';
    return `<span class="badge bg-light text-dark border" style="font-size:.68rem">${status || ''}</span>`;
  }

  function rowHtml(o) {
    return `
      <tr>
        <td>${o.order_date}</td>
        <td class="text-muted">${o.order_num}</td>
        <td><strong>${o.invoice_number || '—'}</strong></td>
        <td>${o.customer_name || '—'}</td>
        <td>${o.sales_rep || '—'}</td>
        <td>${o.ship_method || '—'}</td>
        <td>${statusBadge(o.status)}</td>
        <td>${o.ship_date || '—'}</td>
        <td>${o.tracking_number ? `<span class="font-monospace" style="font-size:.78rem">${o.tracking_number}</span>` : '—'}</td>
      </tr>`;
  }

  function render() {
    const dateF = document.getElementById('dateFilter').value;
    const q = (document.getElementById('searchBox').value || '').trim().toUpperCase();

    let orders = DATA.orders;
    if (dateF) orders = orders.filter(o => o.order_date === dateF);
    if (q) {
      orders = orders.filter(o =>
        (o.invoice_number || '').toUpperCase().includes(q) ||
        (o.customer_name || '').toUpperCase().includes(q) ||
        (o.sales_rep || '').toUpperCase().includes(q)
      );
    }

    document.getElementById('countLine').textContent =
      `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('rows');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">No orders found.</td></tr>';
      return;
    }
    tbody.innerHTML = orders.map(rowHtml).join('');
  }

  document.getElementById('dateFilter').addEventListener('change', render);
  document.getElementById('searchBox').addEventListener('input', render);
  document.getElementById('btnClear').addEventListener('click', () => {
    document.getElementById('searchBox').value = '';
    document.getElementById('dateFilter').value = '';
    render();
  });
</script>
</body>
</html>
