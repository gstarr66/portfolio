<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Holds Sheet — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">Holds Sheet</h5>
    <form class="d-flex gap-2 align-items-center" onsubmit="return false">
      <select id="statusFilter" class="form-select form-select-sm" style="width:160px">
        <option value="active" selected>Active</option>
        <option value="released">Released / Expired</option>
        <option value="all">All</option>
      </select>
      <input type="text" id="searchBox" class="form-control form-control-sm"
             style="width:200px" placeholder="SKU, facility, rep…">
      <button class="btn btn-sm btn-primary" onclick="render()">Search</button>
      <button type="button" class="btn btn-sm btn-outline-secondary" id="btnClear">Clear</button>
    </form>
  </div>

  <div class="text-muted small mb-2" id="countLine">Loading…</div>

  <div class="table-responsive">
  <table class="table table-sm table-hover align-middle" style="font-size:0.82rem" id="holdsTable">
    <thead>
      <tr>
        <th>Rep</th>
        <th>Facility</th>
        <th>SKU</th>
        <th>Item</th>
        <th>Type</th>
        <th class="text-end">Qty</th>
        <th class="text-end">Days</th>
        <th>Date</th>
        <th>Expires</th>
        <th class="text-end pe-4">Approved $</th>
        <th class="ps-3">Stage</th>
        <th>Status</th>
        <th>Notes</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  let DATA = null;

  fetch('../data/sales/holds_sheet.json').then(r => r.json()).then(d => {
    DATA = d;
    render();
  });

  function fmtDate(iso) {
    if (!iso) return null;
    return iso.slice(0, 10);
  }

  function stageBadge(status) {
    if (status === 'approved') return '<span class="badge bg-success" style="font-size:.68rem">Approved</span>';
    if (status === 'pending')  return '<span class="badge bg-warning text-dark" style="font-size:.68rem">Pending</span>';
    if (status === 'released') return '<span class="badge bg-secondary" style="font-size:.68rem">Released</span>';
    if (status === 'expired')  return '<span class="badge bg-light text-muted border" style="font-size:.68rem">Expired</span>';
    return '';
  }

  function typeBadge(hold_type) {
    return hold_type === 'strategic'
      ? '<span class="badge bg-primary" style="font-size:.68rem">Strategic</span>'
      : '<span class="badge bg-secondary" style="font-size:.68rem">Regular</span>';
  }

  function rowHtml(h) {
    const repStatusCell = (h.status === 'approved' || h.status === 'pending')
      ? `<select class="form-select form-select-sm" style="font-size:.75rem;width:105px" data-demo-inert="Rep status">
           <option value="" ${!h.rep_status ? 'selected' : ''}>—</option>
           <option value="invoiced" ${h.rep_status === 'invoiced' ? 'selected' : ''}>Invoiced</option>
           <option value="shipping" ${h.rep_status === 'shipping' ? 'selected' : ''}>Shipping</option>
         </select>`
      : `<span class="text-muted small">${h.rep_status ? (h.rep_status[0].toUpperCase() + h.rep_status.slice(1)) : '—'}</span>`;

    const adjustCell = (h.status === 'approved' && h.rep_status !== 'invoiced' && h.rep_status !== 'shipping')
      ? `<button class="btn btn-outline-warning btn-sm" data-demo-inert="Adjust Hold">Adjust</button>`
      : '';

    return `
      <tr>
        <td>${h.rep || '—'}</td>
        <td>${h.facility || '—'}</td>
        <td><strong>${h.sku}</strong></td>
        <td class="text-muted">${h.item_name || ''}</td>
        <td>${typeBadge(h.hold_type)}</td>
        <td class="text-end fw-semibold">${Math.trunc(h.qty)}</td>
        <td class="text-end">${h.days ?? '—'}</td>
        <td class="text-nowrap">${fmtDate(h.date)}</td>
        <td class="text-nowrap">${h.expires_at ? fmtDate(h.expires_at) : '—'}</td>
        <td class="text-end pe-4">${h.approved_price ? '$' + Number(h.approved_price).toFixed(2) : '—'}</td>
        <td class="ps-3">${stageBadge(h.status)}</td>
        <td>${repStatusCell}</td>
        <td style="min-width:160px">
          <span data-demo-inert="Edit Notes" style="cursor:pointer">
            ${h.notes || ''}<span class="text-muted ms-1" style="font-size:.7rem">✎</span>
          </span>
        </td>
        <td>${adjustCell}</td>
      </tr>`;
  }

  function render() {
    const statusF = document.getElementById('statusFilter').value;
    const q = (document.getElementById('searchBox').value || '').trim().toUpperCase();

    let holds = DATA.holds;
    if (statusF === 'active') holds = holds.filter(h => h.status === 'pending' || h.status === 'approved');
    else if (statusF === 'released') holds = holds.filter(h => h.status === 'released' || h.status === 'expired');

    if (q) {
      holds = holds.filter(h =>
        (h.sku || '').toUpperCase().includes(q) ||
        (h.facility || '').toUpperCase().includes(q) ||
        (h.rep || '').toUpperCase().includes(q)
      );
    }

    document.getElementById('countLine').textContent =
      `${holds.length} hold${holds.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('rows');
    if (!holds.length) {
      tbody.innerHTML = '<tr><td colspan="14" class="text-center text-muted py-4">No holds found.</td></tr>';
      return;
    }
    tbody.innerHTML = holds.map(rowHtml).join('');
    // Scoped to the tbody (not window.wireInertLinks()) so repeated re-renders
    // while typing in the search box don't stack duplicate click listeners
    // on the shared nav's [data-demo-inert] items.
    tbody.querySelectorAll('[data-demo-inert]').forEach(function (el) {
      el.addEventListener('click', function (e) {
        e.preventDefault();
        toast('"' + el.getAttribute('data-demo-inert') + '" needs the live SurgiCentral backend — not wired up in this static portfolio demo.', 'secondary');
      });
    });
  }

  document.getElementById('statusFilter').addEventListener('change', render);
  document.getElementById('searchBox').addEventListener('input', render);
  document.getElementById('btnClear').addEventListener('click', () => {
    document.getElementById('searchBox').value = '';
    document.getElementById('statusFilter').value = 'active';
    render();
  });
</script>
</body>
</html>
