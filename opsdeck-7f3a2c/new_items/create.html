<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Item Request — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">New Item Request — Inbound</h4>
    <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Back</a>
  </div>

  <div class="card" style="max-width:640px">
    <div class="card-header bg-dark text-white">Inbound Team — Step 1 of 2</div>
    <div class="card-body">
      <form onsubmit="return false">
        <div class="row g-3">

          <div class="col-12">
            <label class="form-label fw-semibold">GTIN <span class="text-danger">*</span>
              <small class="text-muted fw-normal">(scan barcode or enter manually)</small>
            </label>
            <input class="form-control form-control-lg font-monospace" placeholder="Scan or type GTIN…" autofocus>
          </div>

          <div class="col-6">
            <label class="form-label">Brand <span class="text-danger">*</span></label>
            <input class="form-control form-control-sm">
          </div>

          <div class="col-6">
            <label class="form-label">Item # <span class="text-danger">*</span>
              <small class="text-muted">(GUDID catalog #)</small>
            </label>
            <input class="form-control form-control-sm">
          </div>

          <div class="col-6">
            <label class="form-label">Item SKU <span class="text-danger">*</span>
              <small class="text-muted">(e.g. 1910E)</small>
            </label>
            <input class="form-control form-control-sm" style="text-transform:uppercase">
          </div>

          <div class="col-3">
            <label class="form-label">Unit <span class="text-danger">*</span></label>
            <select id="unitSelect" class="form-select form-select-sm">
              <option value="">—</option>
              <option value="E">E (Each)</option>
              <option value="B">B (Box)</option>
            </select>
          </div>

          <div class="col-3">
            <label class="form-label">Conversion <span class="text-danger">*</span></label>
            <div id="convEach">
              <input class="form-control form-control-sm bg-light" value="Each" readonly id="convEachDisplay" style="display:none">
            </div>
            <div id="convBoxWrap" style="display:none">
              <div class="input-group input-group-sm">
                <span class="input-group-text">Box of</span>
                <input type="number" min="1" id="boxQty" class="form-control" placeholder="qty" style="width:60px">
              </div>
            </div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Recall Checked <span class="text-danger">*</span></label>
            <div class="d-flex gap-4">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="recall_checked" id="recallYes">
                <label class="form-check-label text-success fw-semibold" for="recallYes">Yes — No active recall</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="recall_checked" id="recallNo">
                <label class="form-check-label text-danger" for="recallNo">No — Do NOT admit to inventory</label>
              </div>
            </div>
            <div class="form-text">
              This checks against the <a href="../recalls/dashboard.html">FDA Recall Dashboard</a> before a new SKU is admitted.
            </div>
          </div>

          <div class="col-6">
            <label class="form-label text-muted">Your Name / Initials</label>
            <input class="form-control form-control-sm" placeholder="Future: auto from login">
          </div>

        </div>

        <hr>
        <div class="d-flex justify-content-end gap-2">
          <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">Cancel</a>
          <button type="button" class="btn btn-primary" data-demo-inert="Submit to Inventory Control">Submit to Inventory Control →</button>
        </div>
      </form>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
const unitSel  = document.getElementById('unitSelect');
const eachDisp = document.getElementById('convEachDisplay');
const boxWrap  = document.getElementById('convBoxWrap');

function updateConversion() {
  if (unitSel.value === 'E') {
    eachDisp.style.display = '';
    boxWrap.style.display  = 'none';
  } else if (unitSel.value === 'B') {
    eachDisp.style.display = 'none';
    boxWrap.style.display  = '';
  } else {
    eachDisp.style.display = 'none';
    boxWrap.style.display  = 'none';
  }
}
unitSel.addEventListener('change', updateConversion);
</script>
</body>
</html>
