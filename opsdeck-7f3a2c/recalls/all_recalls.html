<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>All FDA Recalls — SurgiCentral</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="../assets/css/site.css" rel="stylesheet">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="container-fluid px-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">All FDA Device Recalls</h4>
    <a href="dashboard.html" class="btn btn-outline-secondary btn-sm">← Dashboard</a>
  </div>

  <div class="alert alert-secondary py-2 mb-3" id="truncNote" style="font-size:.85rem; display:none"></div>

  <form class="row g-2 mb-3" onsubmit="return false">
    <div class="col-sm-6 col-md-5">
      <input type="text" id="qBox" class="form-control form-control-sm"
             placeholder="Search recall #, device, firm, product code…">
    </div>
    <div class="col-sm-4 col-md-3">
      <select id="statusSel" class="form-select form-select-sm">
        <option value="">All Statuses</option>
      </select>
    </div>
    <div class="col-auto">
      <button type="button" id="btnClear" class="btn btn-outline-secondary btn-sm">Clear</button>
    </div>
  </form>

  <div class="text-muted small mb-2" id="countLine"></div>

  <div id="tableWrap"></div>
  <nav><ul class="pagination pagination-sm" id="pager"></ul></nav>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/site.js"></script>
<script>
  const PER_PAGE = 50;
  let DATA = null;
  let page = 1;

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('-');
    return `${m}/${d}/${y}`;
  }
  function trunc(s, n) {
    if (!s) return '—';
    return s.length > n ? s.slice(0, n) + '…' : s;
  }
  function statusBadge(status) {
    if (!status) return '';
    const terminal = ['terminated', 'completed'].includes(status.toLowerCase());
    return `<span class="badge ${terminal ? 'bg-secondary' : 'bg-warning text-dark'}">${status}</span>`;
  }

  fetch('../data/recalls/all_recalls.json').then(r => r.json()).then(data => {
    DATA = data;
    if (data.truncated) {
      document.getElementById('truncNote').style.display = '';
      document.getElementById('truncNote').textContent = data.truncation_note;
    }
    const statusSel = document.getElementById('statusSel');
    data.statuses.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s.replace(/\b\w/g, c => c.toUpperCase());
      statusSel.appendChild(opt);
    });
    render();
  });

  function filtered() {
    const q = (document.getElementById('qBox').value || '').toLowerCase().trim();
    const status = document.getElementById('statusSel').value;
    return DATA.recalls.filter(r => {
      if (status && (r.status || '').toLowerCase() !== status) return false;
      if (q) {
        const hay = [r.recall_number, r.device_name, r.recall_firm, r.product_code]
          .filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }

  function render() {
    const rows = filtered();
    const totalPages = Math.max(1, Math.ceil(rows.length / PER_PAGE));
    if (page > totalPages) page = totalPages;
    const q = document.getElementById('qBox').value;
    const status = document.getElementById('statusSel').value;

    document.getElementById('countLine').textContent =
      `${rows.length.toLocaleString()} record(s) of ${DATA.embedded_count.toLocaleString()} embedded` +
      (q || status ? ' — filtered' : '');

    const pageRows = rows.slice((page - 1) * PER_PAGE, page * PER_PAGE);

    if (!pageRows.length) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="text-muted fst-italic">No recalls found${q || status ? ' matching your filters' : ''}.</div>`;
      document.getElementById('pager').innerHTML = '';
      return;
    }

    document.getElementById('tableWrap').innerHTML = `
      <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered align-middle">
          <thead><tr><th>Date</th><th>Recall #</th><th>Device / Product</th><th>Firm</th><th>Product Code</th><th>Status</th><th>Reason</th><th>Details</th></tr></thead>
          <tbody>${pageRows.map(r => `
            <tr>
              <td class="text-nowrap">${fmtDate(r.recall_date)}</td>
              <td><code>${r.recall_number}</code></td>
              <td style="font-size:.85rem;max-width:240px;white-space:normal">${trunc(r.device_name, 120)}</td>
              <td style="font-size:.8rem">${r.recall_firm || '—'}</td>
              <td>${r.product_code || '—'}</td>
              <td>${statusBadge(r.status)}</td>
              <td style="max-width:200px;white-space:normal;font-size:.8rem">${trunc(r.reason, 100)}</td>
              <td class="text-center"><a href="recall_detail.html?id=${r.id}" class="btn btn-outline-secondary btn-sm py-0 px-2">View Details</a></td>
            </tr>`).join('')}</tbody>
        </table>
      </div>`;

    renderPager(totalPages);
  }

  function renderPager(totalPages) {
    const pager = document.getElementById('pager');
    if (totalPages <= 1) { pager.innerHTML = ''; return; }
    let html = '';
    if (page > 1) html += `<li class="page-item"><a class="page-link" href="#" data-page="${page - 1}">‹</a></li>`;
    const lo = Math.max(1, page - 2), hi = Math.min(totalPages, page + 2);
    for (let p = lo; p <= hi; p++) {
      html += `<li class="page-item ${p === page ? 'active' : ''}"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`;
    }
    if (page < totalPages) html += `<li class="page-item"><a class="page-link" href="#" data-page="${page + 1}">›</a></li>`;
    pager.innerHTML = html;
    pager.querySelectorAll('a[data-page]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        page = parseInt(a.dataset.page, 10);
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  document.getElementById('qBox').addEventListener('input', () => { page = 1; render(); });
  document.getElementById('statusSel').addEventListener('change', () => { page = 1; render(); });
  document.getElementById('btnClear').addEventListener('click', () => {
    document.getElementById('qBox').value = '';
    document.getElementById('statusSel').value = '';
    page = 1;
    render();
  });
</script>
</body>
</html>
